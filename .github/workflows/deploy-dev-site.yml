name: Deploy dev site

on:
  push:
    branches:
      - dev

jobs:
  deploy-dev-site:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          ref: dev

      - name: Checkout staging repo
        uses: actions/checkout@v4
        with:
          repository: superintelligent-se/wininlife-org-dev
          token: ${{ secrets.STAGING_REPO_TOKEN }}
          path: staging

      - name: Copy website files
        run: |
          rsync -av --delete \
            --exclude ".git" \
            --exclude ".github" \
            ./ staging/

      - name: Commit and push to staging repo
        run: |
          cd staging
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet || git commit -m "Deploy dev site from source repo"
          git push
